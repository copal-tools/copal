version: '3.8'

# All secrets live in server/.env — never commit that file.
# Copy .env.example to .env and fill in real values before first run.

services:
  seaweedfs:
    image: ghcr.io/chrislusf/seaweedfs:latest
    container_name: seaweedfs
    restart: unless-stopped
    ports:
      - "9333:9333" # Master UI
      - "8333:8333" # S3
      - "8888:8888" # Filer (used by clients)
      - "8080:8080" # Volume
    command: >
      server
      -dir=/data/ssd,/data/hdd
      -volume.disk=ssd,hdd
      -volume.max=1000
      -s3
      -s3.port=8333
      -filer
      -filer.port=8888
      -master.port=9333
      -ip.bind=0.0.0.0
      -master.defaultReplication=001
      -master.volumeSizeLimitMB=4000
      -volume.inflightUploadDataTimeout=60m
      -idleTimeout=3600
    volumes:
      - /mnt/FastSSD/seaweed_data:/data/ssd
      - /mnt/pool/SlowHDD/seaweed_data:/data/hdd
      - /mnt/FastSSD/seaweed_temp:/tmp
    environment:
      - WEED_S3_access_key=${WEED_S3_ACCESS_KEY}
      - WEED_S3_secret_key=${WEED_S3_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  db:
    image: postgres:15-alpine
    container_name: asset-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Port intentionally NOT exposed externally — API connects via Docker internal network.
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  asset-api:
    build: ./app
    container_name: asset-hub-api
    restart: always
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SEAWEED_MASTER_URL=${SEAWEED_MASTER_URL}
      - PUBLIC_ACCESS_HOST=${PUBLIC_ACCESS_HOST}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
